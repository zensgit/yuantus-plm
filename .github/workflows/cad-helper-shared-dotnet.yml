name: cad-helper-shared-dotnet

on:
  pull_request:
    paths:
      - ".github/workflows/cad-helper-shared-dotnet.yml"
      - "clients/cad-desktop-helper/Shared/**"
      - "clients/cad-desktop-helper/Shared.Tests/**"
      - "clients/cad-desktop-helper/Detector/**"
      - "clients/cad-desktop-helper/Detector.Tests/**"
      - "clients/cad-desktop-helper/Helper/**"
      - "clients/cad-desktop-helper/Helper.Tests/**"
      - "clients/cad-desktop-helper/Bridge/**"
      - "clients/cad-desktop-helper/Bridge.Tests/**"
      - "clients/cad-desktop-helper/verify_bridge_static.py"
      - "clients/cad-desktop-helper/Lisp/**"
      - "clients/cad-desktop-helper/verify_lisp_shell_static.py"
      - "clients/cad-desktop-helper/Installer/**"
      - "clients/autocad-material-sync/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cad-helper-shared-dotnet.yml"
      - "clients/cad-desktop-helper/Shared/**"
      - "clients/cad-desktop-helper/Shared.Tests/**"
      - "clients/cad-desktop-helper/Detector/**"
      - "clients/cad-desktop-helper/Detector.Tests/**"
      - "clients/cad-desktop-helper/Helper/**"
      - "clients/cad-desktop-helper/Helper.Tests/**"
      - "clients/cad-desktop-helper/Bridge/**"
      - "clients/cad-desktop-helper/Bridge.Tests/**"
      - "clients/cad-desktop-helper/verify_bridge_static.py"
      - "clients/cad-desktop-helper/Lisp/**"
      - "clients/cad-desktop-helper/verify_lisp_shell_static.py"
      - "clients/cad-desktop-helper/Installer/**"
      - "clients/autocad-material-sync/**"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: dotnet build/test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "6.0.x"

      - name: Restore Shared tests
        run: dotnet restore clients/cad-desktop-helper/Shared.Tests/Yuantus.Cad.Shared.Tests.csproj

      - name: Restore Detector tests
        run: dotnet restore clients/cad-desktop-helper/Detector.Tests/Yuantus.Cad.Detector.Tests.csproj

      - name: Restore Helper tests
        run: dotnet restore clients/cad-desktop-helper/Helper.Tests/Yuantus.Cad.Helper.Tests.csproj

      - name: Restore Bridge tests
        run: dotnet restore clients/cad-desktop-helper/Bridge.Tests/Yuantus.Cad.Bridge.Tests.csproj

      - name: Restore AutoCAD material sync client tests
        run: dotnet restore clients/autocad-material-sync/CADDedupPlugin.Client.Tests/CADDedupPlugin.Client.Tests.csproj

      - name: Build Shared
        run: dotnet build clients/cad-desktop-helper/Shared/Yuantus.Cad.Shared.csproj --configuration Release --no-restore

      - name: Test Shared
        run: dotnet test clients/cad-desktop-helper/Shared.Tests/Yuantus.Cad.Shared.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=cad-helper-shared.trx"

      - name: Build Detector
        run: dotnet build clients/cad-desktop-helper/Detector/Yuantus.Cad.Detector.csproj --configuration Release --no-restore

      - name: Test Detector
        run: dotnet test clients/cad-desktop-helper/Detector.Tests/Yuantus.Cad.Detector.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=cad-helper-detector.trx"

      - name: Build Helper
        run: dotnet build clients/cad-desktop-helper/Helper/Yuantus.Cad.Helper.csproj --configuration Release --no-restore

      - name: Test Helper
        run: dotnet test clients/cad-desktop-helper/Helper.Tests/Yuantus.Cad.Helper.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=cad-helper-helper.trx"

      - name: Build Bridge (SDK-free, host adapter excluded via AUTOCAD_HOST symbol)
        run: dotnet build clients/cad-desktop-helper/Bridge/YuantusCadHelperBridge.csproj --configuration Release --no-restore

      - name: Test Bridge contracts
        run: dotnet test clients/cad-desktop-helper/Bridge.Tests/Yuantus.Cad.Bridge.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=cad-helper-bridge.trx"

      - name: Verify CAD helper bridge static contracts
        run: python clients/cad-desktop-helper/verify_bridge_static.py

      - name: Verify CAD helper Lisp shell static contracts
        run: python clients/cad-desktop-helper/verify_lisp_shell_static.py

      - name: Verify CAD helper installer static contracts
        run: python clients/cad-desktop-helper/Installer/verify_installer_static.py

      - name: Test AutoCAD material sync client contracts
        run: dotnet test clients/autocad-material-sync/CADDedupPlugin.Client.Tests/CADDedupPlugin.Client.Tests.csproj --configuration Release --no-restore --logger "trx;LogFileName=cad-helper-material-sync-client.trx"

      - name: Verify AutoCAD material sync static contracts
        run: python clients/autocad-material-sync/verify_material_sync_static.py
