# Collaboration Pack SKU overlay for Yuantus-only delivery.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.profile-collab.yml up -d --build

services:
  api:
    environment:
      YUANTUS_DELIVERY_PROFILE: ${YUANTUS_DELIVERY_PROFILE:-collab}
      YUANTUS_ENABLE_COLLAB: ${YUANTUS_ENABLE_COLLAB:-true}

  worker:
    environment:
      YUANTUS_DELIVERY_PROFILE: ${YUANTUS_DELIVERY_PROFILE:-collab}
      YUANTUS_ENABLE_COLLAB: ${YUANTUS_ENABLE_COLLAB:-true}
